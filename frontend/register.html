<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Mortgage - Create Secure Account</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
    <!-- Inline login redirect script -->
    <script>
        const token = localStorage.getItem("token");
        const role = localStorage.getItem("role");
        if (token && role) {
            if (role === "ROLE_ADMIN") {
                window.location.href = "admin-dashboard.html";
            } else if (role === "ROLE_CUSTOMER") {
                window.location.href = "customer-dashboard.html";
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .register-card {
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }
        .form-control {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: var(--secondary-color);
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(37, 99, 235, 0.25);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none d-inline-flex align-items-center gap-2 text-white fw-bold fs-3">
                        <i class="bi bi-bank text-primary"></i> APEX MORTGAGE
                    </a>
                </div>
                
                <div class="card register-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Create Account</h2>
                        <p class="text-white-50">Join Apex Banking &amp; start your digital mortgage journey.</p>
                    </div>

                    <form id="register-form" class="needs-validation" novalidate>
                        <!-- Name Input -->
                        <div class="mb-3">
                            <label for="name" class="form-label small fw-semibold text-white-50">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-white-50" style="border: 1px solid rgba(255,255,255,0.15);"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control border-start-0" id="name" placeholder="John Doe" required minlength="2">
                                <div class="invalid-feedback">Please enter your full name.</div>
                            </div>
                        </div>

                        <!-- Email Input -->
                        <div class="mb-3">
                            <label for="email" class="form-label small fw-semibold text-white-50">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-white-50" style="border: 1px solid rgba(255,255,255,0.15);"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control border-start-0" id="email" placeholder="john@example.com" required>
                                <div class="invalid-feedback">Please enter a valid email address.</div>
                            </div>
                        </div>

                        <!-- Password Input -->
                        <div class="mb-3">
                            <label for="password" class="form-label small fw-semibold text-white-50">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-white-50" style="border: 1px solid rgba(255,255,255,0.15);"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control border-start-0" id="password" placeholder="••••••••" required minlength="6">
                                <div class="invalid-feedback">Password must be at least 6 characters.</div>
                            </div>
                        </div>

                        <!-- Admin Key Input -->
                        <div class="mb-4">
                            <label for="adminKey" class="form-label small fw-semibold text-white-50">Admin Key <span class="text-white-50 fw-normal">(Optional)</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-white-50" style="border: 1px solid rgba(255,255,255,0.15);"><i class="bi bi-key"></i></span>
                                <input type="password" class="form-control border-start-0" id="adminKey" placeholder="Enter key only for Admin registration">
                            </div>
                            <div class="form-text text-white-50 small mt-1">Leave empty to register as a standard Customer.</div>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary w-100 py-3 mb-3">
                            <i class="bi bi-person-plus me-2"></i>Register
                        </button>
                    </form>

                    <div class="text-center mt-2">
                        <p class="mb-0 text-white-50">Already have an account? <a href="login.html" class="text-white fw-semibold text-decoration-underline">Sign in here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
